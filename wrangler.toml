name = "helder-imoveis"
compatibility_date = "2024-09-23"
pages_build_output_dir = "public"

# ─── Banco de dados D1 ───────────────────────────────────────────
# Após criar o banco com: wrangler d1 create helder-imoveis
# Substitua o database_id pelo ID gerado
[[d1_databases]]
binding = "DB"
database_name = "helder-freire-imoveis"
database_id = "aaf4b7fd-dc95-49a8-bd1e-1f2ffe29c9d8"

# ─── Variáveis de ambiente ───────────────────────────────────────
# Estas são públicas. Segredos vão via: wrangler secret put NOME
[vars]
ADMIN_USER = "admin"
# ADMIN_PASS  → definir com: wrangler secret put ADMIN_PASS
# JWT_SECRET  → definir com: wrangler secret put JWT_SECRET