<!-- ══ ENCONTRE SEU IMÓVEL (PAG 02) ══ -->
<section class="section section-dark" id="buscar">
  <div class="container">
    <div class="buscar-wrap">

      <div class="buscar-header">
        <div class="eyebrow"><div class="eyebrow-line"></div><span class="eyebrow-text">Para você</span></div>
        <h2 class="sec-title" style="margin-top:12px">Para entender suas necessidades!<br><em>E encontrarmos o imóvel certo</em></h2>
      </div>

      <!-- Finalidade -->
      <div class="buscar-finalidade">
        <button class="bf-btn" onclick="selecionarFinalidade('compra', this)">Compra</button>
        <button class="bf-btn" onclick="selecionarFinalidade('investimento', this)">Investimento</button>
        <button class="bf-btn" onclick="selecionarFinalidade('venda', this)">Venda</button>
        <button class="bf-btn" onclick="selecionarFinalidade('moradia', this)">Moradia</button>
      </div>

      <!-- Campo extra quando VENDA está selecionado -->
      <div class="buscar-venda-extra" id="vendaExtra" style="display:none">
        <div class="buscar-venda-info">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#38bdf8"/><path d="M7 4v3.5M7 9.5v.3" stroke="#38bdf8" stroke-width="1.4" stroke-linecap="round"/></svg>
          Você quer <strong>vender</strong> um imóvel? Cadastre-o abaixo e Helder Freire cuida de tudo!
        </div>
        <button class="buscar-venda-btn" onclick="document.getElementById('cadastrar').scrollIntoView({behavior:'smooth'})">
          Cadastrar meu imóvel para venda →
        </button>
      </div>

      <!-- Portfólio / Imóveis disponíveis -->
      <div class="buscar-portfolio" id="portfolioArea">
        <div class="buscar-portfolio-label">Portfólio: <span style="color:rgba(255,255,255,.5)">Imóveis disponíveis:</span></div>
        <div class="buscar-tipos-grid">
          <label class="bt-check"><input type="checkbox" value="planta"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Imóveis na planta</label>
          <label class="bt-check"><input type="checkbox" value="apartamento"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Apartamentos</label>
          <label class="bt-check"><input type="checkbox" value="casa-medio"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Casas – Médio/Alto padrão</label>
          <label class="bt-check"><input type="checkbox" value="condominio"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Condomínios</label>
          <label class="bt-check"><input type="checkbox" value="terreno"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Terrenos</label>
          <label class="bt-check"><input type="checkbox" value="loteamento"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Loteamentos</label>
          <label class="bt-check"><input type="checkbox" value="fazenda"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Fazendas</label>
          <label class="bt-check"><input type="checkbox" value="sitio"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Sítios / Ranchos</label>
          <label class="bt-check"><input type="checkbox" value="comercial"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Comerciais</label>
          <label class="bt-check"><input type="checkbox" value="industrial"><span class="bt-box"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="#22c55e"/><path d="M3.5 7.3L5.8 9.8L10.5 4.5" stroke="#22c55e" stroke-width="1.6" stroke-linecap="round"/></svg></span>Industriais</label>
        </div>
      </div>

      <!-- Campo de busca -->
      <div class="buscar-campo-wrap" id="buscarCampoArea">
        <label class="buscar-campo-label">Descreva seu imóvel ideal</label>
        <div class="buscar-campo-inner">
          <svg class="buscar-lupa" width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="6.5" stroke="rgba(255,255,255,.4)" stroke-width="1.5"/><path d="M12.5 12.5L16 16" stroke="rgba(255,255,255,.4)" stroke-width="1.8" stroke-linecap="round"/></svg>
          <input type="text" id="buscarDesc" class="buscar-input" placeholder="Ex: casa 3 quartos, bairro nobre, até R$500k...">
          <span class="buscar-asterisco">✦</span>
        </div>
        <p class="buscar-sub">Nós encontramos o imóvel certo para você</p>
        <button class="buscar-enviar" onclick="enviarBusca()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Enviar para Helder pelo WhatsApp
        </button>
      </div>

    </div>
  </div>
</section>

<style>
.buscar-wrap {
  max-width: 680px;
  margin: 0 auto;
}
.buscar-header { margin-bottom: 36px; }
.buscar-finalidade {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 28px;
}
.bf-btn {
  padding: 10px 28px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,255,255,.25);
  background: transparent;
  color: rgba(255,255,255,.7);
  font-size: 14px;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: all .2s;
}
.bf-btn:hover { border-color: rgba(201,168,76,.6); color: #e2c87a; }
.bf-btn.active {
  background: rgba(201,168,76,.15);
  border-color: #c9a84c;
  color: #e2c87a;
  font-weight: 600;
}
.buscar-venda-extra {
  background: rgba(56,189,248,.06);
  border: 1px solid rgba(56,189,248,.25);
  border-radius: 12px;
  padding: 16px 20px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.buscar-venda-info {
  flex: 1;
  font-size: 13px;
  color: rgba(255,255,255,.65);
  line-height: 1.6;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.buscar-venda-btn {
  padding: 9px 20px;
  background: rgba(201,168,76,.15);
  border: 1px solid #c9a84c;
  color: #e2c87a;
  border-radius: 8px;
  font-size: 12px;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: background .2s;
}
.buscar-venda-btn:hover { background: rgba(201,168,76,.25); }
.buscar-portfolio { margin-bottom: 28px; }
.buscar-portfolio-label {
  font-size: 14px;
  color: rgba(255,255,255,.75);
  margin-bottom: 16px;
  font-weight: 500;
}
.buscar-tipos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 40px;
}
.bt-check {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 13.5px;
  color: rgba(255,255,255,.7);
  transition: color .15s;
}
.bt-check:hover { color: rgba(255,255,255,.95); }
.bt-check input { display: none; }
.bt-box {
  flex-shrink: 0;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1.5px solid rgba(34,197,94,.5);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
}
.bt-check input:checked + .bt-box {
  background: rgba(34,197,94,.15);
  border-color: #22c55e;
}
.bt-check input:checked ~ * { color: rgba(255,255,255,.95); }
.buscar-campo-wrap { margin-top: 8px; }
.buscar-campo-label {
  display: block;
  font-size: 14px;
  color: rgba(255,255,255,.65);
  margin-bottom: 10px;
  text-align: center;
}
.buscar-campo-inner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,.06);
  border: 1.5px solid rgba(255,255,255,.15);
  border-radius: 50px;
  padding: 12px 20px;
  transition: border-color .2s;
}
.buscar-campo-inner:focus-within {
  border-color: rgba(201,168,76,.5);
}
.buscar-lupa { flex-shrink: 0; }
.buscar-input {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: rgba(255,255,255,.9);
  font-size: 14px;
  font-family: 'Outfit', sans-serif;
}
.buscar-input::placeholder { color: rgba(255,255,255,.3); }
.buscar-asterisco {
  color: #c9a84c;
  font-size: 14px;
  flex-shrink: 0;
}
.buscar-sub {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,.35);
  margin-top: 8px;
  margin-bottom: 20px;
}
.buscar-enviar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px;
  background: #25d366;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: opacity .2s;
}
.buscar-enviar:hover { opacity: .88; }
@media (max-width: 600px) {
  .buscar-tipos-grid { grid-template-columns: 1fr; }
  .buscar-finalidade { gap: 8px; }
  .bf-btn { padding: 9px 20px; font-size: 13px; }
}
</style>

<script>
function selecionarFinalidade(tipo, el) {
  document.querySelectorAll('.bf-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  var vendaExtra = document.getElementById('vendaExtra');
  var portfolioArea = document.getElementById('portfolioArea');
  var buscarCampoArea = document.getElementById('buscarCampoArea');
  if (tipo === 'venda') {
    vendaExtra.style.display = 'flex';
    portfolioArea.style.display = 'none';
    buscarCampoArea.style.display = 'none';
  } else {
    vendaExtra.style.display = 'none';
    portfolioArea.style.display = 'block';
    buscarCampoArea.style.display = 'block';
  }
}

function enviarBusca() {
  var finalidade = '';
  var btnAtivo = document.querySelector('.bf-btn.active');
  if (btnAtivo) finalidade = btnAtivo.textContent.trim();

  var tipos = [];
  document.querySelectorAll('.bt-check input:checked').forEach(function(cb) {
    tipos.push(cb.closest('.bt-check').textContent.trim());
  });

  var descricao = document.getElementById('buscarDesc').value.trim();

  var msg = 'Olá Helder! Estou buscando um imóvel.\n\n';
  if (finalidade) msg += '*Finalidade:* ' + finalidade + '\n';
  if (tipos.length) msg += '*Tipos de interesse:* ' + tipos.join(', ') + '\n';
  if (descricao) msg += '*Descrição:* ' + descricao + '\n';
  msg += '\nPoderia me ajudar a encontrar o imóvel certo?';

  var url = 'https://wa.me/qr/XGTDJPC5WY2QM1?text=' + encodeURIComponent(msg);
  window.open(url, '_blank');
}
</script>
